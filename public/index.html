<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelhouse — Stream Movies & Shows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark"></div>
    <div class="logo-text">REELHOUSE</div>
  </div>

  <nav>
    <div class="nav-item" data-route="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Home
    </div>
    <div class="nav-item" data-route="series">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8M12 18v3"/></svg>
      TV shows
    </div>
    <div class="nav-item" data-route="movie">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M7 3v18M17 3v18"/></svg>
      Movies
    </div>
    <div class="nav-item" data-route="watchlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg>
      My watchlist
    </div>
    <div class="nav-divider"></div>
  </nav>

  <div class="promo">
    <div class="promo-label">About this build</div>
    <div class="promo-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5"/><path d="M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/></svg>
      Express + SQLite, live below
    </div>
  </div>
</aside>

<main>
  <div class="topbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="search-input" type="text" placeholder="Search movies, shows..." />
    </div>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>

  <div id="hero-slot"></div>

  <div id="filter-bar" class="filter-bar" hidden>
    <div class="chip active" data-genre="">All genres</div>
  </div>

  <div id="content"></div>
</main>

<div id="modal-root"></div>
<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
